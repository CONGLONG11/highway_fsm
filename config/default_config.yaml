# ============================================
# Highway FSM 全局配置
# ============================================

# ---- CARLA 连接 ----
carla:
  host: 'localhost'
  port: 2000
  timeout: 10.0
  map: 'Town06'
  sync_mode: true
  delta_seconds: 0.05

# ---- 场景 ----
spawn_point_index: 0
num_npc: 80                # ③ 30→80，大幅增加车流密度
target_speed: 100.0        # km/h

# ---- 感知 ----
perception:
  detection_range: 100.0

# ---- 决策 ----
decision:
  desire_threshold: 0.35   # ③ 0.55→0.35，降低换道触发门槛
  prep_duration: 0.8       # ③ 1.0→0.8，缩短准备时间
  abort_duration: 1.5
  lane_change_timeout: 6.0
  safe_front_dist: 12.0    # ③ 15→12，适当放宽前方安全距离
  safe_rear_dist: 10.0     # ③ 12→10，适当放宽后方安全距离
  use_entropy: true
  use_counterfactual: true
  use_phase_space: true

# ---- 模糊推理 ----
fuzzy:
  front_distance:
    close:  [0, 0, 20, 35]     # ③ 扩大"近"的范围，更容易判定前车近
    medium: [25, 40, 55, 70]
    far:    [60, 80, 100, 100]
  speed_diff:
    negative: [-30, -30, -10, 0]
    zero:     [-5, 0, 0, 5]
    positive: [0, 10, 30, 30]

# ---- 轨迹规划 ----
planner:
  lane_change_time: 3.5
  lane_width: 3.5
  sample_points: 80
  post_distance: 40.0

# ---- 势场修正 ----
risk_field:
  eta: 50.0
  d0: 25.0
  lambda_weight: 0.3
  kv: 0.05

# ---- 控制器 ----
controller:
  k_stanley: 2.5
  k_soft: 1.0
  k_speed_scale: 0.08
  min_k: 0.5
  max_k: 5.0
  lookahead_base: 8.0
  lookahead_speed_factor: 0.5
  max_lookahead: 40.0
  curvature_ff_gain: 1.2
  max_curvature_steer: 0.15
  pid_kp: 1.0
  pid_ki: 0.1
  pid_kd: 0.05
  max_throttle: 0.8
  max_brake: 1.0

# ---- 曲率速度调控（构想①）----
curvature_governor:
  a_lat_max: 4.5             # ① 3.0→4.5，允许更大侧向加速度（高速公路弯道本身缓）
  lookahead_distance: 100.0  # ① 150→100，前瞻缩短，避免过早减速
  sample_spacing: 3.0
  alpha: 150.0               # ① 600→150，大幅降低曲率能量惩罚系数
  min_speed: 60.0            # ① 30→60，高速公路最低速度提高
  filter_alpha_down: 0.10    # ① 0.06→0.10，减速响应稍加快
  filter_alpha_up: 0.35      # ① 0.15→0.35，加速恢复显著加快

# ---- 信息熵（构想③）----
entropy:
  speed_bins: 8
  history_window: 50
  high_entropy_threshold: 2.5
  low_entropy_threshold: 1.0
  min_factor: 0.3
  smoothing: 0.85

# ---- 反事实安全（构想⑤）----
counterfactual:
  time_horizon: 3.0
  dt: 0.2
  num_scenarios: 5
  max_decel: 4.0
  max_accel: 2.0
  min_safe_distance: 3.0
  safety_margin: 1.5

# ---- 相空间安全（构想②）----
phase_space:
  reaction_time: 1.0         # ③ 1.2→1.0，适当降低，避免过于保守
  max_decel: 5.0
  comfort_decel: 3.0
  safety_margin: 1.5         # ③ 2.0→1.5
  ttc_threshold: 2.5         # ③ 3.0→2.5

